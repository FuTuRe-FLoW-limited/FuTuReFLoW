{% extends "base.html" %}
{% block title %}Signup — Rahbar{% endblock %}

{% block content %}
<div class="form-card">
  <div class="eyebrow">Naya Account</div>
  <h2>Signup</h2>
  <form method="POST">
    <div class="form-group">
      <label>Poora Naam</label>
      <input type="text" name="name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Phone / WhatsApp Number</label>
      <input type="tel" name="phone" placeholder="03XXXXXXXXX">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Account Banayein</button>
  </form>
  <p style="text-align:center; margin-top:20px; font-size:0.88rem;">
    Pehle se account hai? <a href="{{ url_for('login') }}">Login karein</a>
  </p>
</div>
{% endblock %}
