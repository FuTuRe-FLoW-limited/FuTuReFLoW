{% extends "base.html" %}
{% block title %}Pricing — Rahbar{% endblock %}

{% block content %}
<section class="section">
  <div class="container" style="max-width:700px;">
    <div class="section-title">
      <div class="eyebrow">Sadgi Aur Shafafiyat</div>
      <h2>Pricing</h2>
    </div>
    <div style="background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:40px; line-height:1.8;">
      {{ content.pricing_text | safe }}
    </div>
    <div style="text-align:center; margin-top:30px;">
      <a href="{{ url_for('login') }}" class="btn btn-primary">Abhi Shuru Karein</a>
    </div>
  </div>
</section>
{% endblock %}
